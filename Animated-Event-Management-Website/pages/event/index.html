<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Premium Experiences</title>
    
    <link rel="stylesheet" href="../../css/style.css" />
    
    <link rel="stylesheet" href="style.css" />
    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
        <div class="logo">
            <a href="../../index.html" class="logo-link">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradEvent)" stroke-width="5"/>
                    <path d="M35 50 L45 60 L65 35" stroke="url(#gradEvent)" stroke-width="5" fill="none" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="gradEvent" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00ffff"/>
                            <stop offset="100%" style="stop-color:#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
               <h2>Event<span>Hub</span></h2>
            </a>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../../index.html">Home</a></li>
            <li><a href="index.html" class="active">Events</a></li>
            <li><a href="../gallery.html">Gallery</a></li>
            <li><a href="../contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <section class="hero" id="hero-slider"></section>

    <main>
      <section class="controls">
        <div class="search-wrapper">
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input
              type="text"
              id="search-input"
              placeholder="Find your next experience..."
            />
          </div>
          <select id="category-select" class="modern-select">
            <option value="all">All Categories</option>
            <option value="music">Music</option>
            <option value="tech">Tech</option>
            <option value="sports">Sports</option>
            <option value="art">Art</option>
          </select>
        </div>

        <div class="category-pills" id="category-filters">
          <button class="pill active" data-cat="all">All</button>
          <button class="pill" data-cat="music">Music</button>
          <button class="pill" data-cat="tech">Tech</button>
          <button class="pill" data-cat="sports">Sports</button>
          <button class="pill" data-cat="art">Art</button>
        </div>
      </section>

      <div id="event-container"></div>
    </main>

    <footer>
      <div class="footer-content">
        <p>&copy; 2026 EventHub. Designed for Natnael A.</p>
        <div class="socials">
          <i class="fab fa-facebook"></i>
          <i class="fab fa-twitter"></i>
          <i class="fab fa-instagram"></i>
        </div>
      </div>
    </footer>

    <script src="../../js/main.js"></script>
    
    <script src="script.js"></script>
  </body>
</html>
