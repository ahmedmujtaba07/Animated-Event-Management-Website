<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Premium Experiences</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">EVENT<span>HUB</span></div>
      <nav>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </nav>
      <div class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></div>
    </header>

    <section class="hero" id="hero-slider"></section>

    <main>
      <section class="controls">
        <div class="search-wrapper">
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input
              type="text"
              id="search-input"
              placeholder="Find your next experience..."
            />
          </div>
          <select id="category-select" class="modern-select">
            <option value="all">All Categories</option>
            <option value="music">Music</option>
            <option value="tech">Tech</option>
            <option value="sports">Sports</option>
            <option value="art">Art</option>
          </select>
        </div>

        <div class="category-pills" id="category-filters">
          <button class="pill active" data-cat="all">All</button>
          <button class="pill" data-cat="music">Music</button>
          <button class="pill" data-cat="tech">Tech</button>
          <button class="pill" data-cat="sports">Sports</button>
          <button class="pill" data-cat="art">Art</button>
        </div>
      </section>

      <div id="event-container"></div>
    </main>

    <footer>
      <div class="footer-content">
        <p>&copy; 2024 EventHub. Designed for Natnael A.</p>
        <div class="socials">
          <i class="fab fa-facebook"></i><i class="fab fa-twitter"></i
          ><i class="fab fa-instagram"></i>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
