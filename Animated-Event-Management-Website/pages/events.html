<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub | Upcoming Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --neon-cyan: #00ffff;
            --neon-purple: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: var(--font-family); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(15,23,42,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.08); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo h2 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-cyan); }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
        .hamburger span { width: 25px; height: 3px; background: var(--neon-cyan); transition: all 0.3s; }

        /* PAGE HEADER */
        .page-header { padding: 130px 5% 50px; text-align: center; background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.15) 0%, transparent 65%); }
        .page-header h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; }
        .page-header h1 span { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: var(--text-muted); font-size: 1rem; }

        /* SEARCH & FILTERS */
        .controls { padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .search-row { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-bar { flex: 1; min-width: 240px; display: flex; align-items: center; gap: 10px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 18px; transition: border-color 0.3s; }
        .search-bar:focus-within { border-color: var(--neon-cyan); }
        .search-bar i { color: var(--text-muted); }
        .search-bar input { background: none; border: none; outline: none; color: var(--text-main); font-size: 0.95rem; width: 100%; }
        .search-bar input::placeholder { color: var(--text-muted); }
        .filter-select { padding: 12px 18px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: var(--text-main); font-size: 0.9rem; outline: none; cursor: pointer; transition: border-color 0.3s; }
        .filter-select:focus { border-color: var(--neon-cyan); }
        .filter-select option { background: #1e293b; }

        /* CATEGORY PILLS */
        .pills { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill { padding: 8px 20px; border-radius: 50px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.25s; }
        .pill:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .pill.active { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: #000; border-color: transparent; font-weight: 700; }

        /* RESULTS COUNT */
        .results-bar { padding: 0 5% 16px; max-width: 1200px; margin: 0 auto; color: var(--text-muted); font-size: 0.85rem; }
        .results-bar span { color: var(--neon-cyan); font-weight: 600; }

        /* EVENTS GRID */
        .events-section { padding: 0 5% 80px; max-width: 1200px; margin: 0 auto; }
        .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

        /* EVENT CARD */
        .event-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 18px; overflow: hidden; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; cursor: pointer; }
        .event-card:hover { transform: translateY(-6px); border-color: rgba(0,255,255,0.3); box-shadow: 0 12px 40px rgba(0,255,255,0.08); }
        .card-img { width: 100%; height: 190px; object-fit: cover; transition: transform 0.5s; }
        .event-card:hover .card-img { transform: scale(1.04); }
        .card-img-wrap { overflow: hidden; position: relative; }
        .card-badge { position: absolute; top: 12px; left: 12px; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .badge-music { background: rgba(0,255,255,0.15); color: var(--neon-cyan); border: 1px solid rgba(0,255,255,0.3); }
        .badge-tech { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .badge-sports { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .badge-art { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
        .card-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .card-meta span { color: var(--text-muted); font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
        .card-meta i { color: var(--neon-cyan); width: 14px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
        .card-price { font-size: 1rem; font-weight: 700; color: var(--neon-cyan); }
        .card-price small { font-size: 0.7rem; color: var(--text-muted); font-weight: 400; }
        .btn-register { padding: 8px 18px; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: #000; border: none; border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.3s; text-decoration: none; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,255,255,0.3); }

        /* HOVER ANIMATION */
        .event-card { animation: fadeInUp 0.4s ease both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* NO RESULTS */
        .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
        .no-results i { font-size: 3rem; margin-bottom: 16px; color: rgba(255,255,255,0.1); }
        .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text-main); }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .events-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .events-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 2rem; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 74px; left: 0; width: 100%; background: rgba(15,23,42,0.98); padding: 28px 0; text-align: center; gap: 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
            .nav-links.open { display: flex; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <svg viewBox="0 0 100 100" width="38" height="38">
                <circle cx="50" cy="50" r="45" fill="none" stroke="url(#g1)" stroke-width="5"/>
                <path d="M35 50 L45 60 L65 35" stroke="url(#g1)" stroke-width="5" fill="none" stroke-linecap="round"/>
                <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#00ffff"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs>
            </svg>
            <h2>EventHub</h2>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">Home</a></li>
            <li><a href="events.html" class="active">Events</a></li>
            <li><a href="event-details.html">Details</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </nav>

    <div class="page-header">
        <h1>Upcoming <span>Events</span></h1>
        <p>Discover and register for the best events near you</p>
    </div>

    <div class="controls">
        <div class="search-row">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search events...">
            </div>
            <select class="filter-select" id="sortSelect">
                <option value="default">Sort By: Default</option>
                <option value="date">Sort By: Date</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
            </select>
        </div>
        <div class="pills" id="pillFilters">
            <button class="pill active" data-cat="all">All Events</button>
            <button class="pill" data-cat="music">🎵 Music</button>
            <button class="pill" data-cat="tech">💻 Tech</button>
            <button class="pill" data-cat="sports">⚽ Sports</button>
            <button class="pill" data-cat="art">🎨 Art</button>
        </div>
    </div>

    <div class="results-bar"><span id="resultCount">8</span> events found</div>

    <div class="events-section">
        <div class="events-grid" id="eventsGrid"></div>
        <div class="no-results" id="noResults">
            <i class="fas fa-calendar-times"></i>
            <h3>No events found</h3>
            <p>Try a different search or filter</p>
        </div>
    </div>

    <script src="../js/events.js"></script>
    <script>
        const eventsData = [
            { id:1, title:'Music Festival 2026', cat:'music', date:'June 15, 2026', time:'6:00 PM', location:'New York, USA', price:2500, img:'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=800&q=80' },
            { id:2, title:'AI & Future Tech Summit', cat:'tech', date:'July 20, 2026', time:'9:00 AM', location:'Lahore, Pakistan', price:3500, img:'https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=800&q=80' },
            { id:3, title:'Cultural Fusion Event', cat:'art', date:'October 9, 2026', time:'4:00 PM', location:'Karachi, Pakistan', price:1500, img:'https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&w=800&q=80' },
            { id:4, title:'International Sports Gala', cat:'sports', date:'August 5, 2026', time:'3:00 PM', location:'Dubai, UAE', price:4000, img:'https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=800&q=80' },
            { id:5, title:'Acoustic Horizon Festival', cat:'music', date:'September 12, 2026', time:'7:00 PM', location:'Islamabad, Pakistan', price:2000, img:'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=800&q=80' },
            { id:6, title:'UX/UI Innovation Summit', cat:'tech', date:'November 3, 2026', time:'10:00 AM', location:'Kuala Lumpur, Malaysia', price:5000, img:'https://images.unsplash.com/photo-1515187029135-18ee286d815b?auto=format&fit=crop&w=800&q=80' },
            { id:7, title:'Modern Art Exhibition', cat:'art', date:'December 1, 2026', time:'2:00 PM', location:'Berlin, Germany', price:1800, img:'https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=800&q=80' },
            { id:8, title:'Football Championship 2026', cat:'sports', date:'March 5, 2027', time:'5:00 PM', location:'London, UK', price:6000, img:'https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=800&q=80' },
        ];

        let currentCat = 'all';
        let currentSearch = '';
        let currentSort = 'default';

        function getBadgeClass(cat) {
            return { music:'badge-music', tech:'badge-tech', sports:'badge-sports', art:'badge-art' }[cat] || 'badge-tech';
        }

        function renderEvents() {
            let data = [...eventsData];
            if (currentCat !== 'all') data = data.filter(e => e.cat === currentCat);
            if (currentSearch) data = data.filter(e => e.title.toLowerCase().includes(currentSearch.toLowerCase()) || e.location.toLowerCase().includes(currentSearch.toLowerCase()));
            if (currentSort === 'price-low') data.sort((a,b) => a.price - b.price);
            if (currentSort === 'price-high') data.sort((a,b) => b.price - a.price);

            const grid = document.getElementById('eventsGrid');
            const noRes = document.getElementById('noResults');
            document.getElementById('resultCount').textContent = data.length;

            if (data.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
            noRes.style.display = 'none';

            grid.innerHTML = data.map((e, i) => `
                <div class="event-card" style="animation-delay:${i*0.07}s" onclick="window.location.href='event-details.html'">
                    <div class="card-img-wrap">
                        <img class="card-img" src="${e.img}" alt="${e.title}" loading="lazy">
                        <div class="card-badge ${getBadgeClass(e.cat)}">${e.cat}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${e.title}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-calendar"></i>${e.date} · ${e.time}</span>
                            <span><i class="fas fa-map-marker-alt"></i>${e.location}</span>
                        </div>
                        <div class="card-footer">
                            <div class="card-price">PKR ${e.price.toLocaleString()} <small>/ticket</small></div>
                            <a href="event-details.html" class="btn-register">Register →</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Pill filters
        document.getElementById('pillFilters').addEventListener('click', e => {
            if (!e.target.classList.contains('pill')) return;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            currentCat = e.target.dataset.cat;
            renderEvents();
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', e => {
            currentSearch = e.target.value;
            renderEvents();
        });

        // Sort
        document.getElementById('sortSelect').addEventListener('change', e => {
            currentSort = e.target.value;
            renderEvents();
        });

        // Hamburger
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });

        renderEvents();
    </script>
</body>
</html>
